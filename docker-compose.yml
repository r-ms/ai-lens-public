services:
  app:
    image: ghcr.io/r-ms/ai-lens/app:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://ailens:${POSTGRES_PASSWORD:-ailens}@postgres:5432/ailens
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ailens
      POSTGRES_USER: ailens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailens"]
      interval: 10s
      timeout: 5s
      retries: 5

  analyzer:
    image: ghcr.io/r-ms/ai-lens/analyzer:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://ailens:${POSTGRES_PASSWORD:-ailens}@postgres:5432/ailens
      - ANALYSIS_INTERVAL=${ANALYSIS_INTERVAL:-3600}
    volumes:
      - claude_home:/home/claude
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  claude_home:
